version: 2
updates:
  # Keep GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

# Note: SPM dependencies (KeyboardShortcuts, LaunchAtLogin) aren't tracked
# here because Speedread.xcodeproj is generated by xcodegen and gitignored,
# so there's no committed Package.resolved for Dependabot to read. Their
# version constraints live in project.yml; bump them manually when needed.
