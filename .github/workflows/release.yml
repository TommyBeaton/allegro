name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DATE="$(date +'%B %Y')"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE"      >> "$GITHUB_OUTPUT"

      - name: Set Info.plist version
        run: |
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleShortVersionString ${{ steps.vars.outputs.version }}" \
            Allegro/Info.plist
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion ${{ github.run_number }}" \
            Allegro/Info.plist

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build DMG
        run: ./scripts/dmg.sh

      - name: Rename DMG + measure size
        id: dmg
        run: |
          VERSIONED="build/Allegro-${{ steps.vars.outputs.version }}.dmg"
          LATEST="build/Allegro.dmg"
          if [[ ! -f "$VERSIONED" ]]; then
            echo "Expected $VERSIONED to exist" >&2
            exit 1
          fi
          cp "$VERSIONED" "$LATEST"
          SIZE_BYTES=$(stat -f%z "$VERSIONED")
          SIZE_MB=$(awk -v b="$SIZE_BYTES" 'BEGIN { printf "%.1f", b/1024/1024 }')
          echo "size_mb=$SIZE_MB" >> "$GITHUB_OUTPUT"
          echo "versioned=$VERSIONED" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST"       >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.vars.outputs.tag }}" \
            "${{ steps.dmg.outputs.versioned }}" \
            "${{ steps.dmg.outputs.latest }}" \
            --title "Allegro ${{ steps.vars.outputs.tag }}" \
            --generate-notes

      - name: Update marketing site
        env:
          VER: ${{ steps.vars.outputs.tag }}
          SIZE: ${{ steps.dmg.outputs.size_mb }}
          DATE: ${{ steps.vars.outputs.date }}
          DMG: Allegro-${{ steps.vars.outputs.version }}.dmg
        run: |
          perl -i -pe 's|<!--ver-->[^<]*<!--/ver-->|<!--ver-->$ENV{VER}<!--/ver-->|g' marketing/index.html
          perl -i -pe 's|<!--size-->[^<]*<!--/size-->|<!--size-->$ENV{SIZE}<!--/size-->|g' marketing/index.html
          perl -i -pe 's|<!--date-->[^<]*<!--/date-->|<!--date-->$ENV{DATE}<!--/date-->|g' marketing/index.html
          perl -i -pe 's|<!--dmg-->[^<]*<!--/dmg-->|<!--dmg-->$ENV{DMG}<!--/dmg-->|g' marketing/index.html

      - name: Open PR with version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/${{ steps.vars.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Allegro/Info.plist marketing/index.html
          if git diff --staged --quiet; then
            echo "No marketing/Info.plist changes — skipping PR."
            exit 0
          fi
          git commit -m "Release ${{ steps.vars.outputs.tag }}: bump version and marketing site"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release ${{ steps.vars.outputs.tag }}: bump version and marketing site" \
            --body "Auto-generated by the release workflow after tag **${{ steps.vars.outputs.tag }}** was pushed.

          The DMG has already been published to the [release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.vars.outputs.tag }}). Merging this PR redeploys the marketing site with the new version (\`${{ steps.vars.outputs.tag }}\`), DMG filename, and size (${{ steps.dmg.outputs.size_mb }} MB)."
