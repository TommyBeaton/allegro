name: Allegro
options:
  bundleIdPrefix: app.allegro
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.0.0"

targets:
  Allegro:
    type: application
    platform: macOS
    sources:
      - path: Allegro
    resources:
      - path: Allegro/Resources/Assets.xcassets
        optional: true
    info:
      path: Allegro/Info.plist
      properties:
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSAccessibilityUsageDescription: "Allegro needs Accessibility access so it can read the text you've selected (by simulating Cmd+C) when you trigger it."
        CFBundleDisplayName: Allegro
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.allegro.Allegro
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Allegro/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts
      - package: LaunchAtLogin
        product: LaunchAtLogin

  AllegroTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AllegroTests
    dependencies:
      - target: Allegro
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Allegro.app/Contents/MacOS/Allegro"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.allegro.AllegroTests

schemes:
  Allegro:
    build:
      targets:
        Allegro: all
        AllegroTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AllegroTests
    archive:
      config: Release
